<!DOCTYPE html>
<html> 
<head>
<title>W3.CSS Template</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<style>
body {font-family: "Times New Roman", Georgia, Serif;}
h1, h2, h3, h4, h5, h6 {
  font-family: "Playfair Display";
  letter-spacing: 5px;
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="w3-top">
  <div class="w3-bar w3-white w3-padding w3-card" style="letter-spacing:4px;">
    <a href="#home" class="w3-bar-item w3-button">Criadores Marcelo e Gabriel Melo</a>
    <div class="w3-right w3-hide-small">  
      <a href="#contato" class="w3-bar-item w3-button">Contato</a>
    </div>
  </div>
</div>

<!-- Header -->
<header class="w3-display-container w3-content w3-wide" style="max-width:1600px;min-width:500px" id="home">
  <div class="w3-display-bottomleft w3-padding-large w3-opacity">
    <h1 class="w3-xxlarge">Le Catering</h1>
  </div>
</header>

<!-- Page content -->
<div class="w3-content" style="max-width:1100px">

  <!-- About Section -->
  <div class="w3-row w3-padding-64" id="about">
    <div class="w3-col m12 w3-padding-large">
      <h1 class="w3-center">Peso e Altura</h1><br>
      <p class="w3-large">
        Página para fazer os cálculos de seu IMC conforme os passos. 
        A resposta será enviada ao Whatsapp pessoal da pessoa.
      </p>
    </div>
  </div>
  
  <hr>
  
  <div class="w3-container w3-padding-64" id="contato">
  <h1>Contato & IMC</h1><br>
  <p>Preencha os dados abaixo para enviar seu IMC direto para o WhatsApp:</p>
  
  <form id="form-imc-whatsapp" onsubmit="enviarParaWhatsApp(event)">
    <p><input class="w3-input w3-padding-16" type="text" id="nome" placeholder="Nome" required></p>
    
    <p><input class="w3-input w3-padding-16" type="number" id="peso" placeholder="Peso (ex: 75.5)" min="1" max="500" step="0.1" required></p>
    <p><input class="w3-input w3-padding-16" type="number" id="altura" placeholder="Altura (ex: 1.75)" min="0.5" max="3" step="0.01" required></p>
    
    <p><input class="w3-input w3-padding-16" type="text" id="mensagem" placeholder="Mensagem adicional" name="Message"></p>
    <p><button class="w3-button w3-light-grey w3-section" type="submit">Enviar Resultados</button></p>
  </form>
</div>

<script>
function enviarParaWhatsApp(event) {
  // 1. Impede a página de recarregar ao enviar o formulário
  event.preventDefault(); 

  // ========================================================
  // ATENÇÃO: Substitua os números abaixo pelo SEU número de WhatsApp completo
  // Formato: Código do País (55) + DDD + Número (ex: 5521999999999)
  // ========================================================
  const meuNumeroWhatsApp = "5521999999999"; 

  // 2. Captura os valores digitados pelo usuário
  const nome = document.getElementById('nome').value;
  const peso = parseFloat(document.getElementById('peso').value);
  const altura = parseFloat(document.getElementById('altura').value);
  const mensagemAdicional = document.getElementById('mensagem').value || "Nenhuma";

  // 3. Realiza o cálculo do IMC internamente
  const imc = peso / (altura * altura);
  let classificacao = "";

  // 4. Define a classificação com base no resultado do IMC
  if (imc < 18.5) { classificacao = "Abaixo do peso"; }
  else if (imc < 25) { classificacao = "Peso normal"; }
  else if (imc < 30) { classificacao = "Sobrepeso"; }
  else if (imc < 35) { classificacao = "Obesidade grau I"; }
  else if (imc < 40) { classificacao = "Obesidade grau II"; }
  else { classificacao = "Obesidade grau III"; }

  // 5. Monta o texto que será enviado na conversa do WhatsApp
  const textoMensagem = `*Nova mensagem de IMC recebida!* 🏃‍♂️\n\n` +
                        `• *Nome:* ${nome}\n` +
                        `• *Peso:* ${peso} kg\n` +
                        `• *Altura:* ${altura} m\n` +
                        `• *IMC calculado:* ${imc.toFixed(2)}\n` +
                        `• *Classificação:* ${classificacao}\n` +
                        `• *Mensagem:* ${mensagemAdicional}\n\n` +
                        ` _Enviado via formulário do site._`;

  // 6. Transforma o texto em um formato que a URL do navegador entenda
  const mensagemCodificada = encodeURIComponent(textoMensagem);

  // 7. Cria o link final da API do WhatsApp e redireciona o usuário
  const urlFinal = `https://wa.me/${meuNumeroWhatsApp}?text=${mensagemCodificada}`;
  
  // Abre o WhatsApp em uma nova aba (ou no aplicativo se for celular)
  window.open(urlFinal, '_blank');
}
</script>
    </form>

    <div id="resultado"></div>
  </div>

</div>
</script>

</body>
</html>
