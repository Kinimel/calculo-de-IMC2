<!DOCTYPE html>
<html> 
<head>
<title>W3.CSS Template</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<style>
body {font-family: "Times New Roman", Georgia, Serif;}
h1, h2, h3, h4, h5, h6 {
  font-family: "Playfair Display";
  letter-spacing: 5px;
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="w3-top">
  <div class="w3-bar w3-white w3-padding w3-card" style="letter-spacing:4px;">
    <a href="#home" class="w3-bar-item w3-button">Criadores Marcelo e Gabriel Melo</a>
    <div class="w3-right w3-hide-small">  
      <a href="#contato" class="w3-bar-item w3-button">Contato</a>
    </div>
  </div>
</div>

<!-- Header -->
<header class="w3-display-container w3-content w3-wide" style="max-width:1600px;min-width:500px" id="home">
  <div class="w3-display-bottomleft w3-padding-large w3-opacity">
    <h1 class="w3-xxlarge">Le Catering</h1>
  </div>
</header>

<!-- Page content -->
<div class="w3-content" style="max-width:1100px">

  <!-- About Section -->
  <div class="w3-row w3-padding-64" id="about">
    <div class="w3-col m12 w3-padding-large">
      <h1 class="w3-center">Peso e Altura</h1><br>
      <p class="w3-large">
        Página para fazer os cálculos de seu IMC conforme os passos. 
        A resposta será enviada ao Whatsapp pessoal da pessoa.
      </p>
    </div>
  </div>
  
  <hr>
  
  <!-- Contact Section -->
  <div class="w3-container w3-padding-64" id="contato">
    <h1>Contato</h1><br>
    <p>Preencha os dados abaixo:</p>
    <form id="contato IMC 2">
      <p><input class="w3-input w3-padding-16" type="text" placeholder="Nome" required name="Nome"></p>
      <p><input class="w3-input w3-padding-16" type="number" placeholder="Altura/Peso" required name="Dados"></p>
      <p><input class="w3-input w3-padding-16" type="text" placeholder="Mensagem" required name="Message"></p>
      <p><button class="w3-button w3-light-grey w3-section" type="submit">Enviar</button></p>
    </form>

    <div id="resultado"></div>
  </div>

</div>

<!-- Footer -->
<footer class="w3-center w3-light-grey w3-padding-32">
  <p>Powered by <a href="https://www.w3schools.com/w3css/default.asp" target="_blank" class="w3-hover-text-green">w3.css</a></p>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();
  // apenas mostra uma mensagem de sucesso, sem chamar nada externo
  document.getElementById("result").innerHTML = 
    "<p style='color:green'>Formulário enviado (simulação)</p>";
});
</script>

</body>
</html>
